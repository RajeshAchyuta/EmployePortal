<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Update Employee</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#141e30,#243b55);
    overflow:hidden;
}

body::before{
    content:'';
    position:absolute;
    width:500px;
    height:500px;
    background:rgba(0,255,255,0.15);
    border-radius:50%;
    top:-120px;
    left:-120px;
    filter:blur(90px);
}

body::after{
    content:'';
    position:absolute;
    width:400px;
    height:400px;
    background:rgba(255,0,255,0.15);
    border-radius:50%;
    bottom:-120px;
    right:-120px;
    filter:blur(90px);
}

.container{
    position:relative;
    width:400px;
    padding:35px;
    border-radius:25px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 8px 32px rgba(0,0,0,0.4);
    z-index:1;
}

h2{
    text-align:center;
    margin-bottom:30px;
    color:white;
    font-size:30px;
}

.input-box{
    margin-bottom:22px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#f1f1f1;
}

.input-box input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    outline:none;
    background:rgba(255,255,255,0.15);
    color:white;
    font-size:15px;
}

.input-box input::placeholder{
    color:#ddd;
}

.input-box input:focus{
    box-shadow:0 0 12px #00e5ff;
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    color:white;
    margin-top:10px;
    transition:0.4s;
}

.update-btn{
    background:linear-gradient(45deg,#ff6d00,#ffab00);
}

.update-btn:hover{
    transform:translateY(-4px);
    box-shadow:0 0 18px #ff9100;
}

.back-btn{
    background:linear-gradient(45deg,#2979ff,#00b0ff);
}

.back-btn:hover{
    transform:translateY(-4px);
    box-shadow:0 0 18px #40c4ff;
}

</style>

</head>

<body>

<div class="container">

    <h2>Update Employee</h2>

    <form action="UpdateDetails" method="post">

        <div class="input-box">
            <label>Employee ID</label>
            <input type="text"
                   name="eid"
                   placeholder="Enter Employee ID">
        </div>

        <div class="input-box">
            <label>New Employee Name</label>
            <input type="text"
                   name="ename"
                   placeholder="Enter New Name">
        </div>

        <div class="input-box">
            <label>New Employee Salary</label>
            <input type="text"
                   name="esal"
                   placeholder="Enter New Salary">
        </div>

        <button class="btn update-btn">
            ✏ Update Employee
        </button>

    </form>

    <button class="btn back-btn"
        onclick="window.location.href='Home.html'">
        ⬅ Back to Home
    </button>

</div>

</body>
</html>
