<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Forgot Password</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#141e30,#243b55);
    overflow-x:hidden;
    overflow-y:auto;
    padding:30px;
}

/* Container */

.container{
    width:420px;
    padding:40px;
    border-radius:28px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.12);
    box-shadow:0 10px 35px rgba(0,0,0,0.35);
}

.container h1{
    text-align:center;
    color:white;
    margin-bottom:30px;
    font-size:34px;
}

/* Input */

.input-box{
    margin-bottom:22px;
    position:relative;
}

.input-box label{
    display:block;
    color:white;
    margin-bottom:8px;
    font-weight:bold;
}

.input-box i{
    position:absolute;
    top:47px;
    left:14px;
    color:#cbd5e1;
}

.input-box input{
    width:100%;
    padding:14px 14px 14px 45px;
    border:none;
    border-radius:12px;
    outline:none;
    background:rgba(255,255,255,0.15);
    color:white;
    font-size:15px;
}

.input-box input:focus{
    box-shadow:0 0 14px #00e5ff;
}

/* Button */

.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:linear-gradient(45deg,#2563eb,#00b0ff);
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:0.4s;
}

.btn:hover{
    transform:translateY(-5px);
    box-shadow:0 0 22px rgba(0,176,255,0.45);
}

</style>

</head>

<body>

<div class="container">

    <h1>Forgot Password</h1>

    <form action="ForgotPasswordServlet"
          method="post">

        <!-- Email -->

        <div class="input-box">

            <label>Email</label>

            <i class="fa-solid fa-envelope"></i>

            <input type="email"
                   name="email"
                   placeholder="Enter Registered Email"
                   required>

        </div>

        <!-- New Password -->

        <div class="input-box">

            <label>New Password</label>

            <i class="fa-solid fa-lock"></i>

            <input type="password"
                   name="password"
                   placeholder="Enter New Password"
                   required>

        </div>

        <!-- Button -->

        <button class="btn">

            Reset Password

        </button>
       

    </form>

</div>

</body>

</html>
